data:
  dataset: ml-1m
  genre_concentration: 0.6
  min_item_ratings: 2
  min_user_ratings: 2
  num_clients: 20
  public_user_ratio: 0.5
  quantity_imbalance: 0.5
  seed: 42
  use_hybrid: true
federated:
  dp:
    enabled: false
    max_grad_norm: 1.0
    noise_multiplier: 0.1
    target_delta: 1.0e-05
  fraction_fit: 0.5
  num_rounds: 20
  proximal_mu: 0.01
  strategy: fedavg
model:
  dropout: 0.2
  embedding_dim: 32
  mlp_layers:
  - 128
  - 64
  - 32
training:
  batch_size: 256
  centralized_epochs: 50
  learning_rate: 0.001
  local_epochs: 3
  weight_decay: 0.001
